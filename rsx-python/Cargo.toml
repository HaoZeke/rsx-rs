[package]
name = "pyrsx"
version = "0.2.0"
edition = "2024"
rust-version = "1.85"
license = "GPL-3.0-or-later"
description = "Python bindings for rsx: RAD-seq sex determination toolkit"
repository = "https://github.com/HaoZeke/rsx-rs"

[lib]
name = "pyrsx"
crate-type = ["cdylib"]

[dependencies]
rsx-core = { path = "../rsx-core", features = ["parallel"] }
pyo3 = { version = "0.23", features = ["extension-module", "abi3-py39"] }

# Arrow + Parquet for direct data production (no temp files visible to Python)
arrow-array = "54"
arrow-schema = "54"
parquet = { version = "54", features = ["arrow"] }

# We will return pyarrow objects from Rust
# (using pyo3 to construct PyArrow tables from RecordBatches)

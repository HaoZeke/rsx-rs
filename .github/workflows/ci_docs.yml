name: Build and Deploy Documentation
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build_docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: false
          environments: docs
          locked: false

      - uses: purcell/setup-emacs@master
        with:
          version: 30.1

      - name: Build documentation site
        run: |
          mkdir -p docs/source/_static
          pixi run -e docs site

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/build

      - name: Check links (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--config lychee.toml --no-progress 'docs/build/**/*.html' README.md"
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure Cloudflare Pages project exists
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@3 pages project create rsx --production-branch=main || true

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/build --project-name=rsx --branch=main
          # Site available at rsx.rgoswami.me (primary); pyrsx alias is secondary for bindings docs.

<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none" aria-labelledby="rsx-icon-title" role="img">
  <title id="rsx-icon-title">rsx icon</title>
  <desc>Icon for rsx: streaming RAD-seq markers with restriction cut for sex marker toolkit.</desc>

  <!-- Background subtle rounded container for icon use (optional, comment out for pure mark) -->
  <!-- <rect x="12" y="12" width="232" height="232" rx="48" fill="#F8FAFC"/> -->

  <!-- Centered mark -->
  <g transform="translate(32 32) scale(1.05)">
    <!-- Left marker cluster -->
    <rect x="18" y="28" width="52" height="11" rx="2.5" fill="#0F766E"/>
    <rect x="28" y="46" width="68" height="11" rx="2.5" fill="#0F766E"/>
    <rect x="14" y="64" width="42" height="11" rx="2.5" fill="#EA580C"/>
    <rect x="24" y="82" width="58" height="11" rx="2.5" fill="#0F766E"/>
    <rect x="34" y="100" width="38" height="11" rx="2.5" fill="#0F766E"/>

    <!-- Cut separator -->
    <line x1="100" y1="18" x2="100" y2="118" stroke="#0F172A" stroke-width="7" stroke-linecap="round"/>
    <path d="M95 44 L105 44" stroke="#0F172A" stroke-width="3" stroke-linecap="round"/>
    <path d="M95 92 L105 92" stroke="#0F172A" stroke-width="3" stroke-linecap="round"/>

    <!-- Right marker cluster (contrast group) -->
    <rect x="118" y="36" width="48" height="11" rx="2.5" fill="#0F766E"/>
    <rect x="112" y="54" width="34" height="11" rx="2.5" fill="#0F766E"/>
    <rect x="124" y="72" width="56" height="11" rx="2.5" fill="#EA580C"/>
    <rect x="116" y="90" width="28" height="11" rx="2.5" fill="#0F766E"/>
  </g>
</svg>

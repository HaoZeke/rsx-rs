<svg xmlns="http://www.w3.org/2000/svg" width="320" height="120" viewBox="0 0 320 120" fill="none" aria-labelledby="rsx-logo-title" role="img">
  <title id="rsx-logo-title">rsx — high-performance RAD-seq toolkit</title>
  <desc>Logo for rsx: Rust streaming toolkit for RAD-seq sex determination marker analysis.</desc>

  <!-- Icon mark: stylized streaming RAD markers with restriction cut -->
  <g id="rsx-mark">
    <!-- Left cluster (markers / k-mers) -->
    <!-- Row 1 -->
    <rect x="18" y="28" width="42" height="9" rx="2" fill="#0F766E"/>
    <!-- Row 2 -->
    <rect x="26" y="42" width="58" height="9" rx="2" fill="#0F766E"/>
    <!-- Row 3 - significant / orange accent marker -->
    <rect x="14" y="56" width="36" height="9" rx="2" fill="#EA580C"/>
    <!-- Row 4 -->
    <rect x="22" y="70" width="50" height="9" rx="2" fill="#0F766E"/>
    <!-- Row 5 -->
    <rect x="30" y="84" width="32" height="9" rx="2" fill="#0F766E"/>

    <!-- Restriction cut / separator (strong vertical element) -->
    <line x1="92" y1="22" x2="92" y2="98" stroke="#0F172A" stroke-width="5" stroke-linecap="round"/>
    <!-- Subtle cut "notch" marks to evoke enzyme cut site -->
    <path d="M88 42 L96 42" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M88 78 L96 78" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Right cluster: fewer / contrasting markers (sex-specific contrast) -->
    <rect x="106" y="36" width="38" height="9" rx="2" fill="#0F766E"/>
    <rect x="100" y="50" width="28" height="9" rx="2" fill="#0F766E"/>
    <rect x="112" y="64" width="46" height="9" rx="2" fill="#EA580C"/>
    <rect x="104" y="78" width="22" height="9" rx="2" fill="#0F766E"/>
  </g>

  <!-- Wordmark -->
  <text x="168" y="78" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="62" font-weight="800" letter-spacing="-2.5" fill="#0F172A">rsx</text>
</svg>

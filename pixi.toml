[workspace]
name = "rsx-rs"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
rust = ">=1.85"

[feature.dev.tasks]
check = { cmd = "cargo fmt --check && cargo clippy -- -D warnings && cargo test" }
build = { cmd = "RUSTFLAGS='-C target-cpu=native' cargo build --release" }
build-portable = { cmd = "cargo build --release" }
test = { cmd = "cargo test" }
gen-header = { cmd = "cargo build --manifest-path rsx-core/Cargo.toml --features gen-header" }
bench = { cmd = "RUSTFLAGS='-C target-cpu=native' cargo bench --manifest-path rsx-core/Cargo.toml" }

[feature.dev.dependencies]
cargo-nextest = "*"
compilers = ">=1.8"
pkg-config = "*"
zlib = "*"

[feature.docs.dependencies]
python = ">=3.11"
pip = "*"
emacs = "*"
sphinx = ">=7,<9"
pandoc = ">=3.1,<4"

[feature.docs.pypi-dependencies]
shibuya = ">=2026.1.9, <2027"
sphinxcontrib-rust = ">=1.0.0, <2"
sphinx-rustdoc-postprocess = ">=0.1.0, <0.2"
sphinx-click = ">=6.0"

[feature.docs.tasks]
setup-rustdocgen = { cmd = "cargo install sphinx-rustdocgen --root \"$CONDA_PREFIX\"", description = "Install sphinx-rustdocgen for Rust API docs" }
mkrst = { cmd = "emacs --batch --load docs/export.el", description = "Export orgmode docs to RST" }
site = { cmd = "sphinx-build docs/source docs/_build -b html", depends-on = ["mkrst", "setup-rustdocgen"] }

[feature.python.dependencies]
python = ">=3.11"

[feature.python.pypi-dependencies]
maturin = ">=1.0, <2"
pytest = ">=8"

[feature.python.tasks]
build-python = { cmd = "cd rsx-python && PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 maturin develop --release" }
test-python = { cmd = "pytest rsx-python/tests/", depends-on = ["build-python"] }

[feature.mpi.dependencies]
mpich = "*"
compilers = ">=1.8"

[feature.mpi.tasks]
build-mpi = { cmd = "MPICC=$CONDA_PREFIX/bin/mpicc CC=$CONDA_PREFIX/bin/mpicc C_INCLUDE_PATH=$CONDA_PREFIX/include LIBRARY_PATH=$CONDA_PREFIX/lib RUSTFLAGS='-C target-cpu=native' cargo build --release --features mpi" }

[feature.benchmark]
platforms = ["linux-64"]
channels = ["bioconda"]

[feature.benchmark.dependencies]
python = ">=3.11"
bc = "*"
compilers = ">=1.8"
matplotlib-base = "*"
pandas = "*"
pkg-config = "*"
plotnine = "*"
sra-tools = "*"
zlib = "*"

[feature.benchmark.pypi-dependencies]
siuba = "*"

[feature.benchmark.tasks]
generate-data = { cmd = "python benchmarks/generate_data.py --outdir benchmarks/data-regenerated", description = "Regenerate synthetic RAD-seq benchmark data into benchmarks/data-regenerated" }
build-rsx = { cmd = "cargo build --release", description = "Build the rsx release binary used by the benchmark harness" }
run-benchmarks = { cmd = "bash benchmarks/run_benchmarks.sh", description = "Run the benchmark suite against benchmarks/data", depends-on = ["build-rsx"] }
plot-benchmarks = { cmd = "python benchmarks/plot_benchmarks.py --input benchmarks/results/benchmark_results.csv --output docs/figures", description = "Generate benchmark summary and SVG plots from results CSV" }
check-benchmark-docs = { cmd = "python benchmarks/check_benchmark_docs.py --csv benchmarks/results/benchmark_results.csv --docs docs/orgmode/reference/benchmarks.org", description = "Validate benchmark documentation against the tracked CSV" }
check-literature-manifest = { cmd = "python benchmarks/check_literature_manifest.py --manifest benchmarks/literature_datasets.tsv", description = "Validate the literature-derived benchmark manifest" }
literature-metadata = { cmd = "python benchmarks/run_literature_benchmarks.py --manifest benchmarks/literature_datasets.tsv --metadata-only --results benchmarks/results/literature_benchmark_results.csv --summary docs/figures/literature_benchmark_summary.tsv", description = "Query NCBI metadata for the literature benchmark datasets" }
run-literature-benchmarks = { cmd = "python benchmarks/run_literature_benchmarks.py --manifest benchmarks/literature_datasets.tsv --results benchmarks/results/literature_benchmark_results.csv --summary docs/figures/literature_benchmark_summary.tsv", description = "Download and run the literature-derived benchmark datasets", depends-on = ["build-rsx"] }
run-literature-medaka = { cmd = "python benchmarks/run_literature_benchmarks.py --manifest benchmarks/literature_datasets.tsv --dataset oryzias_latipes --results benchmarks/results/literature_benchmark_results.csv --summary docs/figures/literature_benchmark_summary.tsv", description = "Download and run the public medaka literature benchmark", depends-on = ["build-rsx"] }
analyze-literature-bayes = { cmd = "python benchmarks/analyze_bayesian_evidence.py --workdir benchmarks/literature-workdir --results benchmarks/results/literature_bayesian_evidence.csv", description = "Summarize Bayesian sex-linkage evidence from literature distribution tables" }
compare-literature-radsex = { cmd = "python benchmarks/compare_literature_radsex.py --workdir benchmarks/literature-workdir --results benchmarks/results/literature_speed_comparison.csv", description = "Run same-input rsx vs C++ RADSex timing comparisons on downloaded literature data", depends-on = ["build-rsx"] }
plot-literature-benchmarks = { cmd = "python benchmarks/plot_literature_benchmarks.py --input benchmarks/results/literature_benchmark_results.csv --bayesian benchmarks/results/literature_bayesian_evidence.csv --comparison benchmarks/results/literature_speed_comparison.csv --output docs/figures", description = "Generate paper figures from literature benchmark and Bayesian evidence CSVs" }
package-figshare = { cmd = "bash repro/benchmarks/package_for_figshare.sh", description = "Prepare the benchmark data package for DOI deposition" }
test-package = { cmd = "bash repro/benchmarks/test_package_for_figshare.sh", description = "Validate the benchmark DOI package layout" }

[environments]
default = { features = ["dev"], solve-group = "default" }
docs = { features = ["docs"], solve-group = "default" }
benchmark = { features = ["benchmark"], solve-group = "default" }
python = { features = ["python"], solve-group = "default" }
mpi = { features = ["dev", "mpi"], solve-group = "default" }

[workspace]
name = "rsx-rs"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
rust = ">=1.85"

[feature.dev.tasks]
check = { cmd = "cargo fmt --check && cargo clippy -- -D warnings && cargo test" }
build = { cmd = "cargo build --release" }
test = { cmd = "cargo test" }
gen-header = { cmd = "cargo build --manifest-path rsx-core/Cargo.toml --features gen-header" }
bench = { cmd = "cargo bench --manifest-path rsx-core/Cargo.toml" }

[feature.dev.dependencies]
cargo-nextest = "*"

[feature.docs.dependencies]
python = ">=3.11"
pip = "*"
emacs = "*"
sphinx = ">=8"

[feature.docs.pypi-dependencies]
shibuya = "*"

[feature.docs.tasks]
mkrst = { cmd = "emacs --batch --load docs/export.el", description = "Export orgmode docs to RST" }
site = { cmd = "sphinx-build docs/source docs/_build" }

[environments]
default = { features = ["dev"], solve-group = "default" }
docs = { features = ["docs"], solve-group = "default" }

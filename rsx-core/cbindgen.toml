language = "C"
include_guard = "RSX_H"
header = """// GPL-3.0-or-later
// Copyright 2024--present rsx-rs developers
//
// Auto-generated by cbindgen -- do not edit manually.
"""
after_includes = ""
trailer = ""
include_version = true
autogen_warning = "/* Warning: this file is auto-generated by cbindgen. Do not modify this manually. */"
documentation = true
documentation_style = "doxy"

[export]
include = []
exclude = []

[export.rename]

[fn]
rename_args = "None"

[struct]
rename_fields = "None"

[enum]
rename_variants = "ScreamingSnakeCase"

[parse]
parse_deps = false
